<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <link rel="stylesheet" href="style.css">
    <meta charset="utf-8">
    <title>Scooter Lime</title>
  </head>

  <body>

    <div class="contenitore">
      <!-- Logo e Titolo -->
      <header>
        <img class="logo" src="logo.png">
        <h1 class="logotext">Taking Booleaners from A to B</h1>
      </header>

      <nav>
        <!-- Noleggio -->
        <button type="button">Prenota</button>
        <button type="button">Termina Prenotazione</button>
        <button type="button">Accendi luci</button>
      </nav>

      <main>
        <!-- Scooter più vicini a noi e stato carica-->
        <div>
          <input type="checkbox">
          <span class="importante">Monopattino Gino22</span><br>
          <span class="info-via-e-metri">⟼Via Guadalametri- a 220 metri da te<br>Stato carica:</span><br>
          <hr id="primorisultato">
        </div>

        <div>
          <input type="checkbox">
          <span class="importante">Monopattino Mike24</span><br>
          <span class="info-via-e-metri">⟼Via Ricciardoni- a 420 metri da te<br>Stato carica:</span><br>
          <hr id="secondorisultato">
        </div>

        <div class="row">
          <input type="checkbox">
          <span class="importante">Monopattino Gino22</span><br>
          <span class="info-via-e-metri">⟼Via Vattelapesca- a 570 metri da te<br>Stato carica:</span><br>
          <hr id="terzorisultato">
        </div>

      </main>
    </div>

</html>
